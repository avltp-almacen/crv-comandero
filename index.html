<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Comandero · CRV</title>
<style>
 @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Barlow:wght@400;600;700;800;900&display=swap');

 :root {
 --verde: #1a6b2e;
 --verde-mid: #1e8a3a;
 --verde-light: #27ae60;
 --verde-glow: #2ecc71;
 --bg: #0a0a0a;
 --card: #111111;
 --card2: #1c1c1c;
 --card3: #080808;
 --text: #f0f0f0;
 --text-dim: #888888;
 --rojo: #c0392b;
 --blanco: #ffffff;
 }

 * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

 body {
 font-family: 'Barlow', sans-serif;
 background: var(--bg);
 color: var(--text);
 min-height: 100vh;
 overflow-x: hidden;
 }

 /* ── PANTALLA INICIAL ── */
 #pantalla-inicio {
 display: flex;
 flex-direction: column;
 align-items: center;
 justify-content: center;
 min-height: 100vh;
 padding: 2rem;
 gap: 1.5rem;
 }

 .inicio-logo { width: 100px; height: 100px; border-radius: 50%; }

 .inicio-titulo {
 font-family: 'Oswald', sans-serif;
 font-size: 1.4rem;
 letter-spacing: 3px;
 color: #fff;
 text-align: center;
 }
 .inicio-titulo span { color: var(--verde-glow); }

 .inicio-campo {
 width: 100%;
 max-width: 320px;
 display: flex;
 flex-direction: column;
 gap: 0.5rem;
 }

 .inicio-campo label {
 font-size: 0.75rem;
 text-transform: uppercase;
 letter-spacing: 2px;
 color: var(--text-dim);
 }

 .inicio-campo input {
 background: var(--card2);
 border: 2px solid #333;
 border-radius: 10px;
 color: var(--text);
 font-family: 'Barlow', sans-serif;
 font-size: 1.1rem;
 font-weight: 700;
 padding: 0.8rem 1rem;
 outline: none;
 transition: border-color 0.15s;
 }
 .inicio-campo input:focus { border-color: var(--verde-glow); }

 .roles-grid {
 display: grid;
 grid-template-columns: 1fr 1fr;
 gap: 0.8rem;
 width: 100%;
 max-width: 320px;
 }

 .rol-btn {
 padding: 1rem;
 border: 2px solid #333;
 border-radius: 12px;
 background: var(--card);
 color: var(--text-dim);
 font-family: 'Oswald', sans-serif;
 font-size: 1rem;
 letter-spacing: 2px;
 cursor: pointer;
 text-align: center;
 transition: all 0.15s;
 }
 .rol-btn.activo {
 border-color: var(--verde-glow);
 background: rgba(46,204,113,0.1);
 color: var(--verde-glow);
 }

 .btn-entrar {
 width: 100%;
 max-width: 320px;
 padding: 1rem;
 background: var(--verde);
 border: none;
 border-radius: 12px;
 font-family: 'Oswald', sans-serif;
 font-size: 1.2rem;
 letter-spacing: 3px;
 color: #fff;
 cursor: pointer;
 transition: filter 0.15s;
 }
 .btn-entrar:disabled { background: #333; color: #666; cursor: not-allowed; }
 .btn-entrar:not(:disabled):active { filter: brightness(0.85); }

 /* ── HEADER ── */
 header {
 background: linear-gradient(135deg, #050505 0%, var(--verde) 60%, var(--verde-mid) 100%);
 padding: 8px 12px;
 display: flex;
 align-items: center;
 justify-content: space-between;
 position: sticky;
 top: 0;
 z-index: 100;
 border-bottom: 2px solid #1a6b2e;
 }

 .header-left { display: flex; align-items: center; gap: 8px; }
 .escudo { width: 36px; height: 36px; flex-shrink: 0; border-radius: 50%; }

 .header-text h1 {
 font-family: 'Oswald', sans-serif;
 font-size: 16px;
 font-weight: 700;
 letter-spacing: 2px;
 color: #fff;
 line-height: 1.1;
 }
 .header-sub {
 font-size: 9px;
 color: rgba(255,255,255,.5);
 letter-spacing: 2px;
 text-transform: uppercase;
 }

 .header-right { display: flex; align-items: center; gap: 10px; }

 .badge-rol {
 font-size: 0.65rem;
 font-weight: 800;
 text-transform: uppercase;
 letter-spacing: 1px;
 padding: 3px 8px;
 border-radius: 999px;
 }
 .badge-camarero { background: var(--verde); color: #fff; }
 .badge-plancha { background: #f39c12; color: #000; }

 .nombre-header {
 font-size: 0.8rem;
 font-weight: 700;
 color: var(--verde-glow);
 cursor: pointer;
 display: flex;
 align-items: center;
 gap: 4px;
 }

 .hist-icon { font-size: 20px; cursor: pointer; padding: 2px; }

 /* ── TABS ── */
 .tabs-wrap {
 background: var(--card3);
 padding: 6px 6px 0;
 display: flex;
 align-items: flex-end;
 gap: 4px;
 overflow-x: auto;
 scrollbar-width: none;
 border-bottom: 2px solid #222;
 }
 .tabs-wrap::-webkit-scrollbar { display: none; }

 .tab {
 flex-shrink: 0;
 background: var(--card3);
 border: 2px solid #222;
 border-bottom: none;
 border-radius: 7px 7px 0 0;
 padding: 5px 10px 7px;
 font-size: 12px;
 font-weight: 700;
 color: var(--text-dim);
 cursor: pointer;
 display: flex;
 align-items: center;
 gap: 5px;
 min-width: 60px;
 justify-content: center;
 position: relative;
 transition: all .12s;
 }
 .tab.active {
 background: var(--bg);
 border-color: var(--verde-glow);
 color: var(--verde-glow);
 border-bottom: 2px solid var(--bg);
 margin-bottom: -2px;
 padding-bottom: 9px;
 }
 .tab .tab-total { font-size: 10px; color: var(--verde-glow); display: block; font-weight: 800; }
 .tab .close-tab {
 position: absolute; top: 2px; right: 3px;
 font-size: 10px; color: var(--rojo); font-weight: 900;
 }
 .tab-new {
 background: none;
 border: 2px dashed #333;
 border-bottom: none;
 border-radius: 7px 7px 0 0;
 padding: 5px 12px 7px;
 font-size: 18px;
 color: var(--text-dim);
 cursor: pointer;
 flex-shrink: 0;
 }
 .tab-new:active { border-color: var(--verde-glow); color: var(--verde-glow); }

 /* ── MAIN ── */
 .main {
 display: flex;
 flex-direction: column;
 height: calc(100vh - 116px);
 overflow: hidden;
 }

 /* ── PRODUCTOS: scroll solo aquí ── */
 .productos-section {
 flex: 1;
 overflow-y: auto;
 overflow-x: hidden;
 padding: 8px;
 scrollbar-width: thin;
 scrollbar-color: var(--card2) transparent;
 -webkit-overflow-scrolling: touch;
 }

 .categoria-label {
 font-family: 'Oswald', sans-serif;
 font-size: 11px;
 font-weight: 600;
 letter-spacing: 3px;
 color: var(--verde-glow);
 margin: 8px 2px 5px;
 display: flex;
 align-items: center;
 gap: 6px;
 text-transform: uppercase;
 }
 .categoria-label::after {
 content: '';
 flex: 1;
 height: 1px;
 background: linear-gradient(to right, var(--verde), transparent);
 }

 .productos-grid {
 display: grid;
 grid-template-columns: repeat(3, 1fr);
 gap: 5px;
 margin-bottom: 4px;
 }

 /* Botón producto — toque = añadir */
 .prod-btn {
 background: var(--card);
 border: 1.5px solid var(--card2);
 border-radius: 10px;
 padding: 10px 5px 8px;
 cursor: pointer;
 display: flex;
 flex-direction: column;
 align-items: center;
 gap: 3px;
 transition: all .1s;
 position: relative;
 user-select: none;
 min-height: 72px;
 justify-content: center;
 }
 .prod-btn:active {
 transform: scale(.91);
 background: var(--card2);
 border-color: var(--verde-glow);
 box-shadow: 0 0 10px rgba(46,204,113,.3);
 }
 .prod-btn .emoji { font-size: 20px; line-height: 1; }
 .prod-btn .nombre {
 font-size: 10px;
 font-weight: 700;
 text-align: center;
 color: var(--text);
 line-height: 1.15;
 }
 .prod-btn .precio {
 font-size: 11px;
 font-weight: 900;
 color: var(--verde-glow);
 font-family: 'Oswald', sans-serif;
 }
 .prod-btn .badge {
 position: absolute;
 top: -6px; right: -6px;
 background: var(--verde-glow);
 color: #000;
 font-size: 11px;
 font-weight: 900;
 border-radius: 50%;
 width: 20px; height: 20px;
 display: flex; align-items: center; justify-content: center;
 }

 /* ── COMANDA PANEL ── */
 .comanda-panel {
 background: var(--card3);
 border-top: 2px solid #222;
 max-height: 28vh;
 overflow-y: auto;
 flex-shrink: 0;
 scrollbar-width: thin;
 scrollbar-color: var(--card2) transparent;
 }

 .comanda-header {
 display: flex;
 justify-content: space-between;
 align-items: center;
 padding: 6px 10px;
 background: var(--card2);
 font-family: 'Oswald', sans-serif;
 font-size: 12px;
 letter-spacing: 2px;
 color: var(--text-dim);
 position: sticky;
 top: 0;
 }

 .btn-vaciar {
 background: transparent;
 border: 1px solid #444;
 border-radius: 6px;
 color: #666;
 font-size: 11px;
 padding: 3px 8px;
 cursor: pointer;
 }

 .comanda-vacia {
 padding: 14px;
 text-align: center;
 color: #444;
 font-size: 12px;
 }

 .linea-item {
 display: flex;
 align-items: center;
 gap: 6px;
 padding: 6px 10px;
 border-bottom: 1px solid #1a1a1a;
 }

 .li-nombre { flex: 1; font-size: 13px; font-weight: 700; }

 .li-qty-wrap { display: flex; align-items: center; gap: 5px; }

 .li-qty-btn {
 width: 26px; height: 26px;
 border-radius: 50%;
 border: none;
 font-size: 14px;
 font-weight: 900;
 cursor: pointer;
 background: var(--card2);
 color: var(--text);
 display: flex; align-items: center; justify-content: center;
 }
 .li-qty-btn.minus { color: var(--rojo); }
 .li-qty-btn:active { filter: brightness(0.7); }
 .li-qty { font-weight: 900; min-width: 20px; text-align: center; font-family: 'Oswald', sans-serif; font-size: 15px; }

 .li-subtotal {
 font-family: 'Oswald', sans-serif;
 font-size: 13px;
 font-weight: 700;
 color: var(--verde-glow);
 min-width: 52px;
 text-align: right;
 }

 /* ── FOOTER TOTAL ── */
 .footer-total {
 background: var(--card2);
 border-top: 2px solid #2a2a2a;
 padding: 8px 12px;
 flex-shrink: 0;
 position: relative;
 z-index: 10;
 }

 .total-row {
 display: flex;
 justify-content: space-between;
 align-items: center;
 margin-bottom: 6px;
 }
 .total-label {
 font-family: 'Oswald', sans-serif;
 font-size: 18px;
 letter-spacing: 3px;
 color: var(--text-dim);
 }
 .total-amount {
 font-family: 'Oswald', sans-serif;
 font-size: 28px;
 font-weight: 700;
 color: var(--verde-glow);
 }

 .cambio-row {
 display: flex;
 justify-content: space-between;
 align-items: center;
 background: rgba(46,204,113,.08);
 border: 1px solid var(--verde);
 border-radius: 8px;
 padding: 6px 10px;
 margin-bottom: 6px;
 }
 .cambio-label {
 font-family: 'Oswald', sans-serif;
 font-size: 15px;
 color: var(--verde-glow);
 letter-spacing: 2px;
 }
 .cambio-amount {
 font-family: 'Oswald', sans-serif;
 font-size: 20px;
 color: var(--verde-glow);
 font-weight: 700;
 }
 .cambio-row.falta { background: rgba(192,57,43,.15); border-color: var(--rojo); }
 .cambio-row.falta .cambio-label,
 .cambio-row.falta .cambio-amount { color: var(--rojo); }

 .cobro-row {
 display: flex;
 align-items: center;
 gap: 8px;
 margin-bottom: 6px;
 }
 .cobro-label { font-size: 12px; color: var(--text-dim); white-space: nowrap; }
 .cobro-input {
 flex: 1;
 background: var(--card);
 border: 1.5px solid #333;
 border-radius: 8px;
 color: var(--verde-glow);
 font-family: 'Oswald', sans-serif;
 font-size: 18px;
 font-weight: 700;
 padding: 5px 10px;
 outline: none;
 text-align: right;
 }
 .cobro-input:focus { border-color: var(--verde-glow); }

 .teclado-rapido { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
 .teclado-rapido button {
 background: var(--card2);
 border: 1px solid #333;
 border-radius: 6px;
 color: #fff;
 font-size: 12px;
 font-weight: 700;
 font-family: 'Oswald', sans-serif;
 padding: 5px 8px;
 cursor: pointer;
 flex: 1;
 min-width: 42px;
 letter-spacing: 1px;
 }
 .teclado-rapido button:active { background: var(--verde); }

 .botones-accion { display: flex; gap: 6px; }

 .btn-cobrar {
 background: linear-gradient(135deg, var(--verde) 0%, var(--verde-light) 100%);
 border: none;
 border-radius: 10px;
 color: #fff;
 font-family: 'Oswald', sans-serif;
 font-size: 18px;
 font-weight: 700;
 letter-spacing: 3px;
 padding: 10px;
 cursor: pointer;
 flex: 2;
 transition: all .15s;
 }
 .btn-cobrar:active { transform: scale(.96); }
 .btn-cobrar:disabled { background: var(--card2); color: var(--text-dim); cursor: not-allowed; opacity: .5; }

 .btn-plancha {
 background: #1a1a1a;
 border: 2px solid var(--verde-light);
 border-radius: 10px;
 color: var(--verde-glow);
 font-family: 'Oswald', sans-serif;
 font-size: 14px;
 font-weight: 700;
 letter-spacing: 1px;
 padding: 10px 8px;
 cursor: pointer;
 flex: 1;
 transition: all .15s;
 }
 .btn-plancha:active { transform: scale(.96); background: var(--verde); color: #fff; }

 /* ── MODALES ── */
 .modal-overlay {
 position: fixed; inset: 0;
 background: rgba(0,0,0,.85);
 display: flex; align-items: center; justify-content: center;
 z-index: 200; padding: 20px;
 backdrop-filter: blur(4px);
 }
 .modal-overlay.hidden { display: none; }

 .modal-box {
 background: var(--card);
 border: 2px solid #333;
 border-radius: 16px;
 padding: 24px 20px;
 width: 100%;
 max-width: 320px;
 text-align: center;
 }
 .modal-box h2 {
 font-family: 'Oswald', sans-serif;
 font-size: 22px;
 letter-spacing: 3px;
 color: #fff;
 margin-bottom: 12px;
 }
 .modal-resumen { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
 .modal-total {
 font-family: 'Oswald', sans-serif;
 font-size: 36px;
 font-weight: 700;
 color: var(--verde-glow);
 margin-bottom: 6px;
 }
 .modal-cambio-big { font-size: 16px; color: var(--verde-glow); margin-bottom: 16px; }

 .modal-btn-sumup {
 width: 100%; padding: 16px;
 background: #00b8a9;
 border: none; border-radius: 12px;
 font-family: 'Oswald', sans-serif;
 font-size: 19px; font-weight: 700; letter-spacing: 2px;
 color: #fff; cursor: pointer; margin-bottom: 10px;
 }
 .modal-btn-sumup:active { transform: scale(.97); filter: brightness(.9); }

 .modal-btn-efectivo {
 width: 100%; padding: 16px;
 background: var(--verde);
 border: none; border-radius: 12px;
 font-family: 'Oswald', sans-serif;
 font-size: 19px; font-weight: 700; letter-spacing: 2px;
 color: #fff; cursor: pointer; margin-bottom: 10px;
 }
 .modal-btn-efectivo:active { transform: scale(.97); filter: brightness(.9); }

 .efectivo-paga-row {
 display: flex; align-items: center; gap: 10px;
 margin-bottom: 10px; justify-content: space-between;
 }
 .efectivo-paga-row span { font-size: 14px; color: var(--text-dim); }

 .modal-btn-nueva {
 width: 100%; padding: 14px;
 background: var(--verde);
 border: none; border-radius: 10px;
 font-family: 'Oswald', sans-serif;
 font-size: 16px; font-weight: 700; letter-spacing: 2px;
 color: #fff; cursor: pointer; margin-bottom: 8px;
 }
 .modal-btn-cerrar {
 width: 100%; padding: 10px;
 background: transparent;
 border: 1px solid #444; border-radius: 10px;
 color: var(--text-dim); font-size: 13px; cursor: pointer;
 }

 .modal-nombre-box {
 background: var(--card);
 border: 2px solid var(--verde);
 border-radius: 16px;
 padding: 24px 20px;
 width: 100%; max-width: 300px;
 text-align: center;
 }
 .modal-nombre-box h2 {
 font-family: 'Oswald', sans-serif;
 font-size: 18px; letter-spacing: 3px; color: #fff; margin-bottom: 14px;
 }
 .modal-nombre-box input {
 width: 100%; background: var(--card2);
 border: 2px solid #333; border-radius: 8px;
 color: var(--text); font-family: 'Barlow', sans-serif;
 font-size: 16px; font-weight: 700; padding: 10px 12px;
 outline: none; margin-bottom: 12px;
 }
 .modal-nombre-box input:focus { border-color: var(--verde-glow); }
 .modal-btn-ok {
 width: 100%; padding: 10px;
 background: var(--verde); border: none; border-radius: 8px;
 font-family: 'Oswald', sans-serif; font-size: 16px;
 letter-spacing: 2px; color: #fff; cursor: pointer; font-weight: 700;
 }

 /* Modal editar nombre */
 .modal-editar-box {
 background: var(--card);
 border: 2px solid var(--verde-glow);
 border-radius: 16px;
 padding: 24px 20px;
 width: 100%; max-width: 300px;
 text-align: center;
 }
 .modal-editar-box h2 {
 font-family: 'Oswald', sans-serif;
 font-size: 18px; letter-spacing: 2px; color: #fff; margin-bottom: 14px;
 }
 .modal-editar-box input {
 width: 100%; background: var(--card2);
 border: 2px solid #333; border-radius: 8px;
 color: var(--text); font-family: 'Barlow', sans-serif;
 font-size: 18px; font-weight: 700; padding: 10px 12px;
 outline: none; margin-bottom: 12px; text-align: center;
 }
 .modal-editar-box input:focus { border-color: var(--verde-glow); }
 .modal-editar-box .btn-guardar {
 width: 100%; padding: 10px;
 background: var(--verde); border: none; border-radius: 8px;
 font-family: 'Oswald', sans-serif; font-size: 16px;
 letter-spacing: 2px; color: #fff; cursor: pointer;
 }

 /* Modal historial */
 .modal-hist-box {
 background: var(--card);
 border: 2px solid #333;
 border-radius: 16px;
 padding: 20px;
 width: 100%; max-width: 340px;
 max-height: 80vh;
 overflow-y: auto;
 text-align: left;
 }
 .modal-hist-box h2 {
 font-family: 'Oswald', sans-serif;
 font-size: 18px; letter-spacing: 2px; color: #fff;
 margin-bottom: 12px; text-align: center;
 }

 @keyframes fadeIn {
 from { opacity: 0; }
 to { opacity: 1; }
 }

 @keyframes pop {
 0% { transform: scale(1); }
 50% { transform: scale(1.18); }
 100% { transform: scale(1); }
 }
 .pop { animation: pop .15s ease; }

 .animacion {
 position: fixed;
 font-size: 2rem;
 pointer-events: none;
 z-index: 999;
 animation: flotar 0.6s ease forwards;
 }
 @keyframes flotar {
 0% { opacity: 1; transform: translateY(0) scale(1); }
 100% { opacity: 0; transform: translateY(-60px) scale(1.4); }
 }

 .hidden { display: none !important; }
</style>
</head>
<body>

function sugerirNombre() {
 const nums = comandas.map(c => { const m = c.nombre.match(/Mesa (\d+)/); return m ? +m[1] : 0; });
 return `Mesa ${(nums.length ? Math.max(...nums) : 0) + 1}`;
}

function confirmarNombreComanda() {
 const inp = document.getElementById('inputNombre');
 const nombre = inp.value.trim() || inp.placeholder;
 document.getElementById('modalNombre').classList.add('hidden');
 crearComanda(nombre);
}

function crearComanda(nombre) {
 comandas.push({ id: nextId++, nombre, items: [] });
 activeIdx = comandas.length - 1;
 renderTabs(); renderComanda(); actualizarBadges(); resetCobro();
}

function activarTab(idx) {
 activeIdx = idx;
 renderTabs(); renderComanda(); actualizarBadges(); resetCobro();
}

function cerrarTab(idx, e) {
 e.stopPropagation();
 const c = comandas[idx];
 const total = calcTotal(c);
 if (total > 0 && !confirm(`¿Cerrar "${c.nombre}" con ${fmt(total)} pendientes?`)) return;
 comandas.splice(idx, 1);
 if (!comandas.length) { crearComanda(sugerirNombre()); return; }
 activeIdx = Math.min(activeIdx, comandas.length - 1);
 renderTabs(); renderComanda(); actualizarBadges(); resetCobro();
}

 });

// ── ITEMS ─────────────────────────────────────────────────────
function addItem(prod, btn) {
 const c = getComanda(); if (!c) return;
 const ex = c.items.find(i => i.id === prod.id);
 ex ? ex.qty++ : c.items.push({ ...prod, qty: 1 });
 // Animación flotante
 const rect = btn.getBoundingClientRect();
 const anim = document.createElement('div');
 anim.className = 'animacion';
 anim.textContent = prod.emoji;
 anim.style.left = rect.left + rect.width/2 - 16 + 'px';
 anim.style.top = rect.top + 'px';
 document.body.appendChild(anim);
 setTimeout(() => anim.remove(), 650);
 btn.classList.remove('pop'); void btn.offsetWidth; btn.classList.add('pop');
 renderComanda(); actualizarBadges();
}

function cambiarQty(itemId, delta) {
 const c = getComanda(); if (!c) return;
 const ex = c.items.find(i => i.id === itemId); if (!ex) return;
 ex.qty += delta;
 if (ex.qty <= 0) c.items = c.items.filter(i => i.id !== itemId);
 renderComanda(); actualizarBadges();
}

function vaciarComanda() {
 const c = getComanda();
 if (!c || !c.items.length) return;
 if (!confirm('¿Vaciar la comanda?')) return;
 c.items = []; renderComanda(); actualizarBadges(); resetCobro();
}

 if (!c || !c.items.length) {

 }

 panel.appendChild(div);
 });

 document.getElementById('totalAmount').textContent = fmt(total);
 document.getElementById('btnCobrar').disabled = false;

function calcTotal(c) { return c ? c.items.reduce((s,i) => s + i.precio*i.qty, 0) : 0; }

function elegirSumup() {

  const total = calcTotal(c);
  // Registrar en historial
  historial.unshift({ ts: new Date(), nombre: c.nombre, items: [...c.items], total, metodo: 'SumUp', paga: null, cambio: null });

  // Abrir SumUp (total para v1.88+, amount para versiones antiguas)
  const importe = total.toFixed(2);

// ── COBRO: PASO 2 — EFECTIVO ──────────────────────────────────
function elegirEfectivo() {
  const c = getComanda(); if (!c) return;
  const total = calcTotal(c);
  document.getElementById('modalMetodo').classList.add('hidden');
  document.getElementById('efectivoTotal').textContent = fmt(total);
  document.getElementById('efectivoInput').value = '';
  document.getElementById('efectivoCambioRow').style.display = 'none';
  renderTecladoEfectivo(total);
  document.getElementById('modalEfectivo').classList.remove('hidden');
  setTimeout(() => document.getElementById('efectivoInput').focus(), 100);
}

function volverAMetodo() {
  document.getElementById('modalEfectivo').classList.add('hidden');
  document.getElementById('modalMetodo').classList.remove('hidden');
}

function renderTecladoEfectivo(total) {
  const wrap = document.getElementById('efectivoTeclado');
  wrap.innerHTML = '';
  sugerirBilletes(total).forEach(v => {
    const btn = document.createElement('button');
    btn.textContent = v % 1 === 0 ? `${v}€` : `${v.toFixed(2)}€`;
    btn.onclick = () => { document.getElementById('efectivoInput').value = v; calcCambioEfectivo(); };
    wrap.appendChild(btn);
  });
}

function sugerirBilletes(total) {
  const billetes = [5,10,20,50], result = [];
  if (total === Math.round(total*2)/2) result.push(total);
  const r05 = Math.ceil(total*2)/2;
  if (r05 !== total) result.push(r05);
  const rE = Math.ceil(total);
  if (!result.includes(rE)) result.push(rE);
  billetes.forEach(b => { if (b > total && !result.includes(b)) result.push(b); });
  return result.slice(0,5);
}

function calcCambioEfectivo() {
  const total = calcTotal(getComanda());
  const paga = parseFloat(document.getElementById('efectivoInput').value) || 0;
  const row = document.getElementById('efectivoCambioRow');
  if (!paga) { row.style.display = 'none'; return; }
  const cambio = paga - total;
  row.style.display = 'flex';
  if (cambio >= 0) {
    row.className = 'cambio-row';
    row.innerHTML = `<span class="cambio-label">CAMBIO</span><span class="cambio-amount">${fmt(cambio)}</span>`;
  } else {
    row.className = 'cambio-row falta';
    row.innerHTML = `<span class="cambio-label">FALTAN</span><span class="cambio-amount">${fmt(Math.abs(cambio))}</span>`;
  }
}

function confirmarEfectivo() {
  const c = getComanda(); if (!c) return;
  const total = calcTotal(c);
  const paga = parseFloat(document.getElementById('efectivoInput').value) || null;
  const cambio = paga !== null ? paga - total : null;
  historial.unshift({ ts: new Date(), nombre: c.nombre, items: [...c.items], total, metodo: 'Efectivo', paga, cambio });
  guardarHistorial();
  document.getElementById('modalEfectivo').classList.add('hidden');
  vaciarTrasCobro();
}

function vaciarTrasCobro() {
  const c = getComanda();
  if (c) {
    c.items = []; c.nombre = sugerirNombre();
    renderComanda(); actualizarBadges(); renderTabs();
  } else { crearComanda(sugerirNombre()); }
}

 const resumen = `

       <span style="font-family:Oswald,sans-serif;font-size:22px;font-weight:700;color:var(--verde-glow)">${fmt(totalCaja)}</span>
     </div>

       <span>Efectivo: <b style="color:#fff">${fmt(totalEfectivo)}</b></span>
       <span>Tarjeta: <b style="color:#fff">${fmt(totalTarjeta)}</b></span>
       <span>${historial.length} cobros</span>
     </div>
   </div>`;

 const lista = historial.map(h => `
 <div style="background:var(--card3);border-radius:8px;padding:10px 12px;margin-bottom:8px;border:1px solid #222">
 <div style="display:flex;justify-content:space-between;margin-bottom:4px">
 <span style="font-weight:800;font-size:13px">${h.nombre}</span>
 <span style="font-size:11px;color:var(--text-dim)">${h.metodo || ''} · ${h.ts.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})}</span>
 </div>
 <div style="font-size:12px;color:var(--text-dim);margin-bottom:6px">${h.items.map(i=>`${i.qty}×${i.nombre}`).join(', ')}</div>
 <div style="display:flex;justify-content:space-between">
 <span style="font-weight:800;color:var(--verde-glow);font-family:Oswald,sans-serif">${fmt(h.total)}</span>
 ${h.cambio !== null && h.cambio !== undefined ? `<span style="font-size:12px;color:var(--verde-glow)">Cambio: ${fmt(Math.max(0,h.cambio))}</span>` : ''}
 </div>
 </div>`).join('');

 const btnBorrar = `<button onclick="borrarHistorial()" style="width:100%;padding:10px;background:transparent;border:1px solid var(--rojo);border-radius:8px;color:var(--rojo);font-size:13px;cursor:pointer;margin-top:4px">Borrar historial</button>`;

 cont.innerHTML = resumen + lista + btnBorrar;
 modal.classList.remove('hidden');
}

function iniciarPlancha() {
 cargarPlancha();
 setInterval(cargarPlancha, 5000);
}

async function cargarPlancha() {
 try {
 const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`,
 { headers: { 'X-Master-Key': JSONBIN_API_KEY } });
 const j = await r.json();
 renderComandasPlancha(j.record.comandas || []);
 } catch(e) {}
}

function renderComandasPlancha(comandas) {
 const sec = document.getElementById('productosSection');
 const pendientes = comandas.filter(c => !c.lista);
 const esperando = comandas.filter(c => c.lista && !c.recogida);
 const recogidas = comandas.filter(c => c.lista && c.recogida);

 if (!pendientes.length && !esperando.length && !recogidas.length) {
 sec.innerHTML = '<div style="padding:3rem 1rem;text-align:center;color:#444;font-size:1rem"> Sin comandas pendientes</div>';
 return;
 }

 const colorBorde = (c) => {
 if (!c.lista) return 'var(--rojo)';
 if (!c.recogida) return '#f39c12';
 return 'var(--verde)';
 };

 const card = (c) => `
 <div style="background:var(--card);border-left:4px solid ${colorBorde(c)};border-radius:10px;padding:12px;margin-bottom:8px;opacity:${c.recogida?'.4':'1'}">

 : !c.recogida

 : `<div style="text-align:center;color:#555;font-size:0.85rem"> Recogido</div>`
 }
 </div>`;

 let resultado = pendientes.map(card).join('');

 if (esperando.length) {
 resultado += `<div style="padding:6px 2px;color:#f39c12;font-size:0.75rem;text-transform:uppercase;letter-spacing:1px;margin-top:4px">— Esperando recogida (${esperando.length}) —</div>`;
 resultado += esperando.map(card).join('');
 }

 if (recogidas.length) {

 <button onclick="borrarTodosEntregados()" style="background:transparent;border:1px solid #444;border-radius:6px;color:#666;font-size:0.75rem;padding:3px 8px;cursor:pointer"> Borrar todos</button>
 </div>`;
 resultado += recogidas.map(card).join('');
 }

 sec.innerHTML = resultado;
}

async function marcarListo(id) {
 try {
 const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`,
 { headers: { 'X-Master-Key': JSONBIN_API_KEY } });
 const j = await r.json();
 const data = j.record;
 const comanda = data.comandas.find(c => c.id === id);
 if (!comanda) return;
 comanda.lista = true;
 comanda.recogida = false;
 await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
 method: 'PUT',
 headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_API_KEY },
 body: JSON.stringify(data)
 });
 cargarPlancha();
 } catch(e) {}
}

async function borrarComandaPlancha(id) {

// ── ENVIAR A PLANCHA (camarero) ───────────────────────────────
async function enviarAPlancha() {
 const c = getComanda();
 if (!c || !c.items.length) return;
 const bocatas = c.items.filter(i => BOCADILLOS_IDS.includes(i.id));
 if (!bocatas.length) { alert('No hay bocadillos ni montados en esta comanda.'); return; }

 const btn = document.getElementById('btnPlancha');
 btn.disabled = true; btn.textContent = '⏳';

 try {
 const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`,
 { headers: { 'X-Master-Key': JSONBIN_API_KEY } });
 const j = await r.json();
 const data = j.record;
 data.comandas = data.comandas || [];
 const nuevaId = Date.now();
 registrarEnviada(nuevaId);
 data.comandas.unshift({
 id: nuevaId, camarero: miNombre,
 items: bocatas.map(i => ({
 nombre: i.nombre + (i.id.endsWith('-m') || i.id.endsWith('-qm') ? ' (montado)' : ''),
 qty: i.qty
 })),
 hora: new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'}),
 lista: false
 });
 await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
 method: 'PUT',
 headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_API_KEY },
 body: JSON.stringify(data)
 });
 btn.textContent = ' Enviado';
 setTimeout(() => { btn.textContent = ' A PLANCHA'; btn.disabled = false; }, 2000);
 } catch(e) {
 btn.textContent = ' Error';
 setTimeout(() => { btn.textContent = ' A PLANCHA'; btn.disabled = false; }, 2000);
 }
}

function notificar(titulo, cuerpo) {
 // Vibración
 if (navigator.vibrate) navigator.vibrate([400, 100, 400, 100, 400]);

 // Sonido con Web Audio API (sin fichero externo)
 try {
 const ctx = new (window.AudioContext || window.webkitAudioContext)();
 [0, 0.3, 0.6].forEach(t => {
 const osc = ctx.createOscillator();
 const gain = ctx.createGain();
 osc.connect(gain); gain.connect(ctx.destination);
 osc.frequency.value = 880;
 gain.gain.setValueAtTime(0.6, ctx.currentTime + t);
 gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.25);
 osc.start(ctx.currentTime + t);
 osc.stop(ctx.currentTime + t + 0.25);
 });
 } catch(e) {}

 // Aviso en pantalla
 mostrarAvisoPantalla(titulo, cuerpo);
}

// ── POLLING CAMARERO (detectar comandas listas) ───────────────
let comandasYaNotificadas = new Set(); // IDs ya notificados

function registrarEnviada(id) { /* ya no necesario */ }

async function inicializarPolling() {
 try {
 const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`,
 { headers: { 'X-Master-Key': JSONBIN_API_KEY } });
 const j = await r.json();
 // Marcar todas las ya listas para no notificarlas al arrancar
 (j.record.comandas || []).forEach(c => {
 if (c.lista) comandasYaNotificadas.add(c.id); // no notificar las ya existentes al arrancar
 });
 } catch(e) {}
}

async function pollingCamarero() {
 if (miRol !== 'camarero') return;
 try {
 const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`,
 { headers: { 'X-Master-Key': JSONBIN_API_KEY } });
 const j = await r.json();
 const comandasRemota = j.record.comandas || [];
 comandasRemota.forEach(c => {
 if (
 c.lista &&
 !c.recogida &&
 c.camarero.toLowerCase().trim() === miNombre.toLowerCase().trim() &&
 !comandasYaNotificadas.has(c.id)
 ) {
 comandasYaNotificadas.add(c.id);
 notificarConRecogida(c);
 }
 });
 } catch(e) {}
}

(function restaurarSesion() {
  try {
    const s = JSON.parse(localStorage.getItem('crv-sesion') || 'null');
    if (s && s.nombre && s.rol) {
      miNombre = s.nombre;
      miRol = s.rol;
      arrancarApp();
    }
  } catch(e) {}
})();
